<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <!-- Main gradient for house -->
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <!-- Roof gradient -->
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1"/>
    </linearGradient>
    <!-- Heart gradient -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1e3a8a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon: House with heart -->
  <g filter="url(#shadow)">
    <!-- House body -->
    <rect x="12" y="46" width="56" height="42" rx="4" fill="url(#houseGrad)"/>
    <!-- Roof (triangle) -->
    <polygon points="6,50 40,16 74,50" fill="url(#roofGrad)"/>
    <!-- Chimney -->
    <rect x="52" y="24" width="8" height="14" rx="2" fill="#1e3a8a"/>
    <!-- Door -->
    <rect x="29" y="65" width="14" height="23" rx="3" fill="#dbeafe"/>
    <!-- Door knob -->
    <circle cx="40" cy="77" r="1.5" fill="#93c5fd"/>
    <!-- Window left -->
    <rect x="15" y="58" width="11" height="11" rx="2" fill="#dbeafe"/>
    <!-- Window right -->
    <rect x="54" y="58" width="11" height="11" rx="2" fill="#dbeafe"/>
    <!-- Window cross lines -->
    <line x1="20.5" y1="58" x2="20.5" y2="69" stroke="#93c5fd" stroke-width="1"/>
    <line x1="15" y1="63.5" x2="26" y2="63.5" stroke="#93c5fd" stroke-width="1"/>
    <line x1="59.5" y1="58" x2="59.5" y2="69" stroke="#93c5fd" stroke-width="1"/>
    <line x1="54" y1="63.5" x2="65" y2="63.5" stroke="#93c5fd" stroke-width="1"/>
    <!-- Heart on roof -->
    <g filter="url(#glow)" transform="translate(33, 30)">
      <path d="M7,3 C7,1.3 5.7,0 4,0 C2.3,0 1,1.3 1,3 C1,4 1.5,4.8 2.3,5.5 L7,10 L11.7,5.5 C12.5,4.8 13,4 13,3 C13,1.3 11.7,0 10,0 C8.3,0 7,1.3 7,3 Z" fill="url(#heartGrad)"/>
    </g>
  </g>

  <!-- Text: HomeServe -->
  <g>
    <!-- "Home" text -->
    <text x="90" y="58"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="32"
      font-weight="700"
      fill="#0f172a"
      letter-spacing="-0.5">Home</text>
    <!-- "Serve" text -->
    <text x="167" y="58"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="32"
      font-weight="700"
      fill="#2563eb"
      letter-spacing="-0.5">Serve</text>
    <!-- Tagline -->
    <text x="91" y="76"
      font-family="'Arial', sans-serif"
      font-size="11"
      font-weight="400"
      fill="#64748b"
      letter-spacing="2.5">PROFESSIONAL HOME SERVICES</text>
    <!-- Underline accent -->
    <rect x="91" y="62" width="220" height="2" rx="1" fill="#2563eb" opacity="0.15"/>
    <rect x="91" y="62" width="76" height="2" rx="1" fill="#0f172a" opacity="0.2"/>
    <rect x="167" y="62" width="76" height="2" rx="1" fill="#2563eb" opacity="0.5"/>
  </g>
</svg>
